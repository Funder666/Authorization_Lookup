<!doctype html>
<html lang="zh-CN">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>授权信息查询</title>
    <meta
      name="description"
      content="输入姓名和工号，查询 SR-P-4002 授权台账中的相关授权信息。"
    />
    <link rel="stylesheet" href="./styles.css" />
  </head>
  <body>
    <div class="page-shell">
      <header class="hero">
        <div class="hero-copy simple">
          <h1>授权信息查询</h1>
        </div>
      </header>

      <main class="content-single">
        <section class="search-card compact-card">
          <form id="search-form" class="search-form" autocomplete="off">
            <label class="field">
              <span>姓名</span>
              <input id="name" name="name" type="text" placeholder="请输入姓名" required />
            </label>
            <label class="field">
              <span>工号</span>
              <input
                id="employeeId"
                name="employeeId"
                type="text"
                inputmode="numeric"
                placeholder="请输入工号"
                required
              />
            </label>
            <div class="actions">
              <button type="submit" class="primary-btn">查询</button>
              <button type="button" id="reset-btn" class="secondary-btn">清空</button>
            </div>
          </form>
          <p id="query-hint" class="hint">
            请输入姓名和工号进行联合查询。
          </p>
        </section>
      </main>

      <section id="summary" class="summary hidden"></section>
      <section id="results" class="results hidden"></section>
    </div>

    <template id="result-card-template">
      <article class="result-card">
        <div class="result-head">
          <div>
            <p class="result-sheet"></p>
            <h2 class="result-title"></h2>
          </div>
          <span class="status-badge"></span>
        </div>
        <dl class="field-grid"></dl>
      </article>
    </template>

    <script src="./app.js" defer></script>
  </body>
</html>
