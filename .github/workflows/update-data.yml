name: Update Authorization Data

on:
  push:
    paths:
      - "authorization.xlsx"
      - "scripts/extract_authorizations.py"
      - ".github/workflows/update-data.yml"
  workflow_dispatch:

permissions:
  contents: write

jobs:
  rebuild-data:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"

      - name: Rebuild JSON data
        run: python3 scripts/extract_authorizations.py authorization.xlsx data/authorizations.json

      - name: Commit generated data
        uses: stefanzweifel/git-auto-commit-action@v5
        with:
          commit_message: "chore: regenerate authorization data"
          file_pattern: data/authorizations.json
